name: bronze_orders
description: "Raw orders table from DMS replication (RDS → S3)"
source: "bronze/historical/public/orders/*.csv.gz"
fields:
  - name: order_id
    type: integer
    nullable: false
    description: "Unique order identifier (Primary Key)"

  - name: user_id
    type: integer
    nullable: false
    description: "User identifier (Foreign Key → users)"

  - name: eval_set
    type: string
    nullable: false
    description: "Dataset type: train, test, or prior"
    allowed_values: ["train", "test", "prior"]

  - name: order_number
    type: integer
    nullable: false
    description: "Sequential order number for this user (starts at 1)"

  - name: order_dow
    type: integer
    nullable: false
    description: "Day of week (0=Sunday, 6=Saturday)"
    min_value: 0
    max_value: 6

  - name: order_hour_of_day
    type: integer
    nullable: false
    description: "Hour of day (0-23)"
    min_value: 0
    max_value: 23

  - name: days_since_prior_order
    type: double
    nullable: true
    description: "Number of days since the user's previous order (NULL for first order)"
    min_value: 0