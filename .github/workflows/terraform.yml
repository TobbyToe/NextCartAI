name: Terraform

on:
  pull_request:
    branches: [main]
    paths:
      - "infra/**"
  workflow_dispatch:
    inputs:
      action:
        description: "Action to run"
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - destroy-dms

env:
  AWS_DEFAULT_REGION: ap-southeast-2
  TF_WORKING_DIR: infra/environments/dev

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action || 'plan' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  # needed to post plan comment on PR

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_db_password:    ${{ secrets.TF_VAR_DB_PASSWORD }}
      TF_VAR_db_username:    instacart_admin

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      # ── Init ─────────────────────────────────────────────────────────────────
      - name: Terraform Init
        run: terraform init -input=false

      # ── Format check (PR only) ────────────────────────────────────────────────
      - name: Terraform Format Check
        if: github.event_name == 'pull_request'
        run: terraform fmt -check -recursive ../../..

      # ── Validate ─────────────────────────────────────────────────────────────
      - name: Terraform Validate
        run: terraform validate

      # ── Plan (always) ────────────────────────────────────────────────────────
      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      # ── Post plan as PR comment ───────────────────────────────────────────────
      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(0, 60000) + '\n\n... (truncated)' : plan;
            const body = `### Terraform Plan — \`${{ env.TF_WORKING_DIR }}\`
            <details><summary>Show plan</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`
            </details>

            *Triggered by @${{ github.actor }} on \`${{ github.head_ref }}\`*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('Terraform Plan') && c.user.type === 'Bot');
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      # ── Apply (manual dispatch only) ─────────────────────────────────────────
      - name: Terraform Apply
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve -input=false tfplan

      # ── Destroy DMS only (manual dispatch) ───────────────────────────────────
      - name: Terraform Destroy DMS
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy-dms'
        run: terraform destroy -target=module.dms -auto-approve -input=false
