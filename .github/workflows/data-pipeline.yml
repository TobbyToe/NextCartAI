name: Data Pipeline

on:
  workflow_dispatch:
    inputs:
      step:
        description: 'Pipeline step to execute'
        required: true
        type: choice
        options:
          - 'seed-rds'
          - 'api-simulator'
          - 'dms-migration'
          - 'bronze-to-silver'
          - 'verify-data'
          - 'cleanup'
        default: 'seed-rds'

env:
  AWS_REGION: ap-southeast-2
  TERRAFORM_DIR: infra/environments/dev

jobs:
  seed-rds:
    if: github.event.inputs.step == 'seed-rds'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform Init
        run: |
          cd $TERRAFORM_DIR
          # Skip provider signature verification to avoid openpgp key expired errors
          export HC_ARCHIVENOSKIPPROVIDERVERIFICATION=false
          terraform init -plugin-dir=/tmp/terraform-plugins || terraform init

      - name: Get Terraform outputs
        id: tf-outputs
        run: |
          cd $TERRAFORM_DIR
          echo "rds_endpoint=$(terraform output -raw rds_endpoint)" >> $GITHUB_OUTPUT
          echo "bronze_bucket=$(terraform output -raw bronze_bucket)" >> $GITHUB_OUTPUT
          echo "RDS Endpoint: $(terraform output -raw rds_endpoint)"
          echo "Bucket: $(terraform output -raw bronze_bucket)"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Seed RDS with historical data
        env:
          RDS_HOST: ${{ steps.tf-outputs.outputs.rds_endpoint }}
          RDS_PASSWORD: ${{ secrets.TF_VAR_db_password }}
        run: |
          python -m instacart_mlops.ingestion.rds_seeder

  api-simulator:
    if: github.event.inputs.step == 'api-simulator'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get Terraform outputs
        id: tf-outputs
        run: |
          cd $TERRAFORM_DIR
          echo "api_endpoint=$(terraform output -raw product_api_endpoint)" >> $GITHUB_OUTPUT
          echo "bronze_bucket=$(terraform output -raw bronze_bucket)" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run API Simulator
        env:
          API_ENDPOINT: ${{ steps.tf-outputs.outputs.api_endpoint }}
          S3_BUCKET: ${{ steps.tf-outputs.outputs.bronze_bucket }}
        run: |
          python -m instacart_mlops.ingestion.api_simulator

  dms-migration:
    if: github.event.inputs.step == 'dms-migration'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check DMS task status
        run: |
          echo "Checking DMS replication tasks..."
          aws dms describe-replication-tasks --region $AWS_REGION
          
          echo "Starting DMS full-load migration..."
          # Get the DMS task ARN and start it
          TASK_ARN=$(aws dms describe-replication-tasks --query "ReplicationTasks[0].ReplicationTaskArn" --output text)
          if [ -n "$TASK_ARN" ]; then
            aws dms start-replication-task --replication-task-arn $TASK_ARN --start-replication-task-type reload-target
            echo "DMS task started: $TASK_ARN"
          else
            echo "No DMS task found. Please check your Terraform deployment."
            exit 1
          fi

      - name: Wait for DMS completion
        run: |
          echo "Waiting for DMS migration to complete (this may take 30-60 minutes)..."
          sleep 3600  # Wait 1 hour, adjust as needed
          
          # Check final status
          TASK_ARN=$(aws dms describe-replication-tasks --query "ReplicationTasks[0].ReplicationTaskArn" --output text)
          aws dms describe-replication-tasks --replication-task-arn $TASK_ARN --query "ReplicationTasks[0].Status" --output text

  bronze-to-silver:
    if: github.event.inputs.step == 'bronze-to-silver'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PySpark
        run: |
          pip install pyspark pyyaml

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get Terraform outputs
        id: tf-outputs
        run: |
          cd $TERRAFORM_DIR
          echo "bronze_bucket=$(terraform output -raw bronze_bucket)" >> $GITHUB_OUTPUT

      - name: Run Bronze to Silver ETL
        env:
          S3_BUCKET: ${{ steps.tf-outputs.outputs.bronze_bucket }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          python -m instacart_mlops.processing.bronze_to_silver --s3-bucket $S3_BUCKET

  verify-data:
    if: github.event.inputs.step == 'verify-data'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get Terraform outputs
        id: tf-outputs
        run: |
          cd $TERRAFORM_DIR
          echo "bronze_bucket=$(terraform output -raw bronze_bucket)" >> $GITHUB_OUTPUT

      - name: Verify Bronze layer data
        run: |
          BUCKET=${{ steps.tf-outputs.outputs.bronze_bucket }}
          echo "=== Bronze Layer Structure ==="
          aws s3 ls s3://$BUCKET/bronze/ --recursive | head -20
          
          echo ""
          echo "=== Bronze API Data ==="
          aws s3 ls s3://$BUCKET/bronze/api/ --recursive | wc -l
          echo "files in bronze/api/"
          
          echo ""
          echo "=== Bronze Historical Data ==="
          aws s3 ls s3://$BUCKET/bronze/historical/ --recursive | wc -l
          echo "files in bronze/historical/"

      - name: Verify Silver layer data
        run: |
          BUCKET=${{ steps.tf-outputs.outputs.bronze_bucket }}
          echo "=== Silver Layer Structure ==="
          aws s3 ls s3://$BUCKET/silver/ --recursive | head -20
          
          echo ""
          echo "=== Silver Orders ==="
          aws s3 ls s3://$BUCKET/silver/orders/ --recursive | wc -l
          echo "files in silver/orders/"
          
          echo ""
          echo "=== Silver Order Products ==="
          aws s3 ls s3://$BUCKET/silver/order_products/ --recursive | wc -l
          echo "files in silver/order_products/"
          
          echo ""
          echo "=== Silver Products ==="
          aws s3 ls s3://$BUCKET/silver/products/ --recursive | wc -l
          echo "files in silver/products/"

  cleanup:
    if: github.event.inputs.step == 'cleanup'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Stop DMS tasks
        run: |
          echo "Stopping all DMS replication tasks..."
          TASK_ARNS=$(aws dms describe-replication-tasks --query "ReplicationTasks[*].ReplicationTaskArn" --output text)
          for TASK_ARN in $TASK_ARNS; do
            aws dms stop-replication-task --replication-task-arn $TASK_ARN
            echo "Stopped task: $TASK_ARN"
          done

      - name: Delete DMS resources
        run: |
          echo "Deleting DMS replication tasks..."
          TASK_ARNS=$(aws dms describe-replication-tasks --query "ReplicationTasks[*].ReplicationTaskArn" --output text)
          for TASK_ARN in $TASK_ARNS; do
            aws dms delete-replication-task --replication-task-arn $TASK_ARN
            echo "Deleted task: $TASK_ARN"
          done
          
          echo "Deleting DMS endpoints..."
          ENDPOINT_ARNS=$(aws dms describe-endpoints --query "Endpoints[*].EndpointArn" --output text)
          for ENDPOINT_ARN in $ENDPOINT_ARNS; do
            aws dms delete-endpoint --endpoint-arn $ENDPOINT_ARN
            echo "Deleted endpoint: $ENDPOINT_ARN"
          done
          
          echo "Deleting DMS replication instances..."
          INSTANCE_ARNS=$(aws dms describe-replication-instances --query "ReplicationInstances[*].ReplicationInstanceArn" --output text)
          for INSTANCE_ARN in $INSTANCE_ARNS; do
            aws dms delete-replication-instance --replication-instance-arn $INSTANCE_ARN
            echo "Deleted instance: $INSTANCE_ARN"
          done

      - name: Delete RDS instance
        run: |
          echo "Deleting RDS instance..."
          aws rds delete-db-instance --db-instance-identifier instacart-dev --skip-final-snapshot
          echo "Waiting for RDS deletion to complete..."
          aws rds wait db-instance-deleted --db-instance-identifier instacart-dev
          echo "RDS instance deleted"

      - name: Delete Lambda function
        run: |
          echo "Deleting Lambda function..."
          aws lambda delete-function --function-name instacart-product-api-dev 2>/dev/null || echo "Lambda function not found"
          echo "Lambda function deleted"

      - name: Delete API Gateway
        run: |
          echo "Deleting API Gateway..."
          API_ID=$(aws apigatewayv2 get-apis --query "Items[?Name=='instacart-product-api-dev'].ApiId" --output text)
          if [ -n "$API_ID" ]; then
            aws apigatewayv2 delete-api --api-id $API_ID
            echo "API Gateway deleted: $API_ID"
          else
            echo "API Gateway not found"
          fi

      - name: Summary
        run: |
          echo "✅ Cleanup completed!"
          echo ""
          echo "Resources deleted:"
          echo "- DMS tasks, endpoints, and replication instances"
          echo "- RDS database instance"
          echo "- Lambda function"
          echo "- API Gateway"
          echo ""
          echo "Resources preserved:"
          echo "- S3 bucket with all data"
          echo "- VPC and networking resources"
          echo ""
          echo "You can now run 'terraform apply' again to recreate the infrastructure if needed."